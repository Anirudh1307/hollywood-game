<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOLLYWOOD - Game Room</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <div id="roomInfo">
      <h2>Room: <span id="roomId"></span></h2>
      <button id="copyLinkBtn" class="btn-secondary">Copy Link</button>
    </div>

    <div id="nameSetup" style="display: none;">
      <h3>Enter Your Name</h3>
      <input type="text" id="nameInput" placeholder="Your name" maxlength="20">
      <button id="submitNameBtn" class="btn-primary">Join Game</button>
    </div>

    <div id="hostSetup" style="display: none;">
      <h3>Host Setup - Set the Word</h3>
      <div id="hostSecretWord" style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none;">
        <p style="color: #666; font-size: 0.9em;">Secret word:</p>
        <p id="hostWordDisplay" style="font-size: 1.5em; font-weight: bold; color: #333;"></p>
      </div>
      <div id="hostRoundLog" style="background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; border-left: 4px solid #667eea;">
        <p id="hostRemainingGuessers" style="color: #667eea; font-weight: bold; margin-bottom: 10px;"></p>
        <h4 style="margin: 0 0 10px 0; color: #333;">Round Guess Log:</h4>
        <div id="hostGuessList" style="max-height: 200px; overflow-y: auto;"></div>
      </div>
      <input type="text" id="wordInput" placeholder="Enter secret word" maxlength="20">
      <input type="text" id="clue1" placeholder="Clue 1 (optional)">
      <input type="text" id="clue2" placeholder="Clue 2 (optional)">
      <input type="text" id="clue3" placeholder="Clue 3 (optional)">
      <div id="hostTimer" style="font-size: 1.2em; color: #667eea; margin: 10px 0;"></div>
      <button id="startGameBtn" class="btn-primary">Start Game</button>
      <button id="skipRoundBtn" class="btn-secondary" style="margin-top: 10px;">Skip My Turn</button>
      
      <div class="chat-container" style="margin-top: 20px;">
        <h4>Chat</h4>
        <div id="hostChatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="hostChatInput" placeholder="Type a message...">
          <button id="hostSendChatBtn" class="btn-secondary">Send</button>
        </div>
      </div>
    </div>

    <div id="waitingArea" style="display: none;">
      <div id="waitingMessage" style="display: none;" class="waiting-message">
        <h3>⏳ Waiting for more players to join...</h3>
        <p>At least 2 players are required to start the game.</p>
      </div>
      <h3 id="hostWaitingText" style="display: none;">Waiting for <span id="currentHostName"></span> to set the word...</h3>
      
      <div class="chat-container">
        <h4>Chat</h4>
        <div id="waitingChatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="waitingChatInput" placeholder="Type a message...">
          <button id="waitingSendChatBtn" class="btn-secondary">Send</button>
        </div>
      </div>
    </div>

    <div id="gameArea" style="display: none;">
      <div id="scoreboard" class="scoreboard"></div>
      
      <div id="turnIndicator" class="turn-indicator"></div>
      
      <div id="turnTimer" style="font-size: 1.1em; color: #f39c12; margin: 10px 0;"></div>
      
      <div id="hostSecretContainer" style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none;">
        <p style="color: #666; font-size: 0.9em;">Secret Word:</p>
        <p id="hostSecretWordDisplay" style="font-size: 1.5em; font-weight: bold; color: #333;"></p>
      </div>
      
      <div id="revealedContainer">
        <p style="color: #666; font-size: 0.9em;">Revealed:</p>
        <div id="wordDisplay" class="word-display"></div>
      </div>
      
      <div id="hollywoodDisplay" class="hollywood"></div>
      
      <div id="cluesSection" class="clues"></div>
      
      <div id="keypad" class="keypad"></div>
      
      <div class="word-guess">
        <input type="text" id="wordGuessInput" placeholder="Guess the word">
        <button id="guessWordBtn" class="btn-primary">Guess</button>
      </div>
      
      <div class="history">
        <div class="history-section">
          <h4>Wrong Letters</h4>
          <div id="wrongLetters"></div>
        </div>
        <div class="history-section">
          <h4>Wrong Words</h4>
          <div id="wrongWords"></div>
        </div>
      </div>

      <div id="gameOverMessage" style="display: none;" class="game-over-overlay"></div>
      
      <div class="chat-container">
        <h4>Chat</h4>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Type a message...">
          <button id="sendChatBtn" class="btn-secondary">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
</body>
</html>
