<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOLLYWOOD - Word Guessing Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>HOLLYWOOD</h1>
    <p class="subtitle">Multiplayer Word Guessing Game</p>
    <button id="createRoomBtn" class="btn-primary">Create Room</button>
    
    <div style="margin-top: 30px;">
      <p>Or join an existing room:</p>
      <input type="text" id="roomCodeInput" placeholder="Enter room code" maxlength="6" style="padding: 10px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 8px;">
      <button id="joinRoomBtn" class="btn-secondary" style="margin-left: 10px;">Join Room</button>
      <div id="joinError" style="color: red; margin-top: 10px; display: none;"></div>
    </div>
  </div>

  <script>
    document.getElementById('createRoomBtn').addEventListener('click', async () => {
      const response = await fetch('/create-room', { method: 'POST' });
      const { roomId } = await response.json();
      window.location.href = `/room/${roomId}`;
    });
    
    document.getElementById('joinRoomBtn').addEventListener('click', async () => {
      const roomId = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if (!roomId) {
        showError('Please enter a room code');
        return;
      }
      
      const response = await fetch('/validate-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roomId })
      });
      const { exists } = await response.json();
      
      if (exists) {
        window.location.href = `/room/${roomId}`;
      } else {
        showError('Room not found');
      }
    });
    
    function showError(msg) {
      const errorDiv = document.getElementById('joinError');
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
    }
    
    document.getElementById('roomCodeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('joinRoomBtn').click();
    });
  </script>
</body>
</html>
